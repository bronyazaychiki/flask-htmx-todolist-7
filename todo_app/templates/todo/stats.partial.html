{# Lightweight overview cards. Counts come from `stats` (see _board_context). #}
<div id="stats" class="grid grid-cols-3 gap-3">
    <div class="bg-slate-700 rounded-lg shadow px-3 py-3 text-center">
        <p class="text-[0.7rem] uppercase tracking-wide opacity-60">Total</p>
        <p class="text-3xl font-bold leading-tight">{{ stats.total }}</p>
    </div>
    <div class="bg-slate-700 rounded-lg shadow px-3 py-3 text-center">
        <p class="text-[0.7rem] uppercase tracking-wide opacity-60">Pending</p>
        <p class="text-3xl font-bold leading-tight text-warning">{{ stats.pending }}</p>
    </div>
    <div class="bg-slate-700 rounded-lg shadow px-3 py-3 text-center">
        <p class="text-[0.7rem] uppercase tracking-wide opacity-60">Done</p>
        <p class="text-3xl font-bold leading-tight text-success">{{ stats.completed }}</p>
    </div>
</div>
