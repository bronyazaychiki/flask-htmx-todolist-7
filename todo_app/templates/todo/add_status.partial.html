{# Inline feedback slot for the quick-add form.
   Rendered empty on first paint; the /todo/quick endpoint re-renders it with
   either `error` (validation hint) or `success` (transient confirmation). #}
{% if error %}
<div role="alert" class="alert alert-error py-2 px-3 text-sm">
    <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-5 w-5" fill="none" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
    </svg>
    <span>{{ error }}</span>
</div>
{% elif success %}
<div class="alert alert-success py-2 px-3 text-sm"
    _="on load wait 1.8s then transition my opacity to 0 over 300ms then remove me">
    <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-5 w-5" fill="none" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <span>Task added.</span>
</div>
{% endif %}
